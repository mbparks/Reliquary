nslateY(0)}.hide{display:none!important}@media(max-width:900px){.grid,.hero{grid-template-columns:1fr}.side{position:static}.stats{grid-template-columns:repeat(2,1fr)}.formgrid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}}

(()=>{
const VERSION='1.0.0',KEY='reliquary-fi072-state-v1';
const cats={electronics:'Electronics',mechanical:'Mechanical',machine:'Machine Files',software:'Software',documentation:'Documentation',media:'Images & Media',reference:'Reference Links'};
const roles=['Source design file','Manufacturing export','Machine operation file','Firmware source','Software source','Bill of materials','Assembly documentation','Test evidence','Setup instructions','Readme','License','Reference image','External reference','Unknown / needs classification'];
const checks=[
 ['project-description','Project description','A plain-language description of what the project is and why it exists.','general'],['hero-image','Hero image','A visual anchor so the project is recognizable later.','general'],['readme','README','A durable overview that can live with the repository.','general'],['bom','Bill of materials','Parts, quantities, notes, and source references.','general'],['assembly-guide','Assembly guide','Enough instruction to build or repair the thing.','general'],['test-procedure','Test procedure','How to verify that the project works.','general'],['known-issues','Known issues','Current limitations, bugs, risks, or fragile assumptions.','general'],['license','License','Terms for use, sharing, and reuse.','general'],['final-snapshot','Final snapshot','A named snapshot that represents the current best design state.','general'],
 ['schematic','Schematic','Electrical design source or exported schematic PDF.','electronics'],['pcb-files','PCB files','Native board files or equivalent fabrication design source.','electronics'],['gerbers','Gerbers','Fabrication package for board production.','electronics'],['pinout','Pinout','Connector, pin, and signal mapping.','electronics'],['power-requirements','Power requirements','Voltage, current, polarity, battery, and protection notes.','electronics'],['firmware-upload','Firmware upload instructions','Board target, programmer, port, and upload method.','electronics'],
 ['cad-source','Mechanical source CAD','Editable CAD source, not just exported meshes.','mechanical'],['stl-3mf','STL or 3MF exports','Printable or manufacturable geometry exports.','mechanical'],['materials','Materials','Filament, sheet stock, fasteners, adhesives, or finishes.','mechanical'],['print-settings','Print or fabrication settings','Layer height, infill, supports, tolerances, or fit notes.','mechanical'],['machine-setup','Machine setup notes','Origin, tooling, feeds, speeds, workholding, or machine-specific setup.','machine'],
 ['source-code','Source code','Editable software or firmware source.','software'],['dependencies','Dependencies','Libraries, runtime, board package, or install requirements.','software'],['configuration','Configuration notes','Environment variables, constants, calibration, or settings.','software']
];
let state=load()||sampleState();let dirty=false;
const $=s=>document.querySelector(s), app=$('#app'), toast=$('#toast');
function uid(p='id'){return p+'_'+Math.random().toString(36).slice(2,9)}
function today(){return new Date().toISOString().slice(0,10)}
function now(){return new Date().toISOString()}
function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch{return null}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));dirty=false;$('#saveState').textContent='Saved';$('#saveState').className='pill ok'}
function touch(msg){dirty=true;$('#saveState').textContent='Saving...';setTimeout(save,80);render();if(msg)note(msg)}
function note(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}
function active(){return state.projects.find(p=>p.id===state.activeProjectId)||state.projects[0]}
function ext(name=''){let m=(name||'').toLowerCase().match(/\.([a-z0-9]+)(\?|#|$)/);return m?m[1]:''}
function artifact(name,cat,role,status,url,notes,snap){return{id:uid('art'),name,category:cat,role,status,url,notes,extension:ext(name||url),snapshotId:snap,createdAt:now(),updatedAt:now()}}
function sampleState(){let s1=uid('snap'),s2=uid('snap');let arts=[artifact('Solar_Badge_RevA.kicad_sch','electronics','Source design file','Current','electronics/Solar_Badge_RevA.kicad_sch','Native KiCAD schematic.',s2),artifact('Solar_Badge_RevA.kicad_pcb','electronics','Source design file','Current','electronics/Solar_Badge_RevA.kicad_pcb','Native KiCAD board layout.',s2),artifact('gerbers-rev-a.zip','electronics','Manufacturing export','Current','electronics/gerbers-rev-a.zip','PCB fabrication package.',s2),artifact('enclosure-front.stl','mechanical','Manufacturing export','Current','mechanical/enclosure-front.stl','Front shell print file. Source CAD intentionally missing.',s2),artifact('enclosure-back.stl','mechanical','Manufacturing export','Current','mechanical/enclosure-back.stl','Back shell print file.',s2),artifact('badge_firmware.ino','software','Firmware source','Current','software/badge_firmware.ino','Arduino sketch for low-power blink and sensing.',s2),artifact('BOM.xlsx','documentation','Bill of materials','Current','docs/BOM.xlsx','Parts list with quantities.',s2),artifact('assembly-notes.md','documentation','Assembly documentation','Draft','docs/assembly-notes.md','Early assembly guide.',s2),artifact('prototype-on-bench.jpg','media','Reference image','Current','media/prototype-on-bench.jpg','Prototype photo.',s1),artifact('laser-jig-v1.svg','machine','Machine operation file','Reference','machine/laser-jig-v1.svg','Laser-cut soldering jig.',s1),artifact('README.md','documentation','Readme','Draft','README.md','Repository overview draft.',s2)];return{theme:'dark',view:'library',activeProjectId:null,filters:{q:'',cat:'all',status:'all'},projects:[{id:uid('proj'),name:'Solar Sensor Badge',code:'FI-072-DEMO',description:'A wearable solar-powered badge that senses ambient light and changes display behavior. This demo intentionally leaves documentation gaps so RELIQUARY can demonstrate rebuild-readiness checks.',status:'Prototype',type:'Electronics',repoUrl:'https://github.com/mbparks/solar-sensor-badge',heroImage:'',tags:['solar','badge','arduino','3d-print'],archived:false,createdAt:now(),updatedAt:now(),notes:'Demo project for RELIQUARY.',artifacts:arts,snapshots:[{id:s2,name:'Prototype Rev A',date:today(),stage:'Prototype',summary:'First integrated prototype with PCB files, firmware sketch, STL exports, BOM, and early assembly notes.',knownIssues:'Mechanical source CAD, print settings, firmware upload details, dependencies, test procedure, and formal license still need to be added.',artifactIds:arts.slice(0,9).map(a=>a.id)},{id:s1,name:'Bench Mockup',date:'2026-06-18',stage:'Breadboard',summary:'Bench mockup confirmed charging concept and basic sensor behavior.',knownIssues:'Power budget not yet documented.',artifactIds:arts.filter(a=>a.snapshotId===s1).map(a=>a.id)}],checklist:{'project-description':'done','bom':'done','assembly-guide':'done','schematic':'done','pcb-files':'done','gerbers':'done','final-snapshot':'done'}}]}}
state.activeProjectId=state.activeProjectId||state.projects[0]?.id;document.body.dataset.theme=state.theme||'dark';
function names(p){let text=(p.artifacts||[]).map(a=>[a.name,a.url,a.role,a.notes].join(' ')).join(' ').toLowerCase();return text}
function has(p,words){let t=names(p);return words.some(w=>t.includes(w))}
function hasExt(p,arr){return(p.artifacts||[]).some(a=>arr.includes((a.extension||ext(a.name||a.url))))}
function gaps(p){let g=[];let add=(sev,title,detail)=>g.push({sev,title,detail});if(!p.description?.trim())add('critical','Project description missing','The project needs a plain-language explanation.');if(!p.heroImage) add('note','Hero image missing','A project image makes the artifact set easier to recognize.');if(!has(p,['readme'])) add('critical','README missing','A repository should include a durable overview.');if(!has(p,['license'])) add('critical','License missing','Published projects should make reuse terms explicit.');if(!has(p,['bom','bill of materials'])) add('critical','BOM missing','Hardware projects need a bill of materials.');if(hasExt(p,['stl','3mf','obj','ply'])&&!hasExt(p,['f3d','f3z','step','stp','sldprt','dwg','dxf']))add('critical','Mechanical source CAD may be missing','Mesh exports exist, but editable source CAD was not found.');if((has(p,['gerber'])||hasExt(p,['gbr','gtl','gbl']))&&!has(p,['schematic','kicad_sch','sch']))add('critical','Schematic may be missing','Fabrication exports exist without obvious schematic documentation.');if(hasExt(p,['ino','py','mpy','cpp','h'])&&!has(p,['upload','flash','programmer','install instructions']))add('critical','Firmware upload instructions missing','Source exists, but the upload or runtime target is unclear.');if(hasExt(p,['gcode','nc','tap','svg','dxf'])&&!has(p,['setup','origin','zero','feeds','speeds','tooling']))add('warning','Machine setup notes missing','Machine files need setup, material, tooling, and safety context.');if(has(p,['bom'])&&!has(p,['assembly','build guide']))add('warning','Assembly path unclear','A BOM exists, but assembly documentation was not detected.');if(hasExt(p,['ino','py','mpy','js'])&&!has(p,['dependency','library','requirements','package.json']))add('warning','Dependencies not documented','Software artifacts should list libraries, board packages, or runtime needs.');if(!has(p,['test','verify','validation']))add('warning','Test procedure missing','There should be a way to prove the project works.');if(!(p.snapshots||[]).length)add('critical','No design snapshots','Create at least one dated snapshot of the current design state.');return g}
function inferredDone(p,id){let t=names(p);let map={'hero-image':!!p.heroImage,'readme':has(p,['readme']),'bom':has(p,['bom','bill of materials']),'assembly-guide':has(p,['assembly','build guide']),'test-procedure':has(p,['test','verify','validation']),'known-issues':(p.snapshots||[]).some(s=>s.knownIssues),'license':has(p,['license']),'schematic':has(p,['schematic','kicad_sch','.sch']),'pcb-files':has(p,['kicad_pcb','pcb']),'gerbers':has(p,['gerber'])||hasExt(p,['gbr','gtl','gbl']),'firmware-upload':has(p,['upload','flash','programmer']),'cad-source':hasExt(p,['f3d','f3z','step','stp','sldprt','dwg']),'stl-3mf':hasExt(p,['stl','3mf']),'machine-setup':has(p,['setup','origin','feeds','speeds','tooling']),'source-code':hasExt(p,['ino','py','mpy','js','css','html','cpp','h']),'dependencies':has(p,['dependency','library','requirements','package.json']),'configuration':has(p,['config','calibration','settings']),'project-description':!!p.description,'final-snapshot':(p.snapshots||[]).length>0,'pinout':has(p,['pinout','connector']),'power-requirements':has(p,['power','voltage','current','battery']),'materials':has(p,['material','filament','stock']),'print-settings':has(p,['layer height','infill','supports','print settings'])};return !!map[id]}
function scores(p){let done=0,active=0;checks.forEach(c=>{let st=p.checklist?.[c[0]];if(st==='na')return;active++;if(st==='done'||inferredDone(p,c[0]))done++});let comp=active?Math.round(done/active*100):0;let gs=gaps(p);let penalty=gs.reduce((n,x)=>n+(x.sev==='critical'?9:x.sev==='warning'?5:2),0);let files=Math.min(18,(p.artifacts||[]).length*2);let snaps=Math.min(12,(p.snapshots||[]).length*6);let conf=Math.max(0,Math.min(100,comp*.55+files+snaps-penalty));return{comp,conf:Math.round(conf),gaps:gs}}
function render(){document.body.dataset.theme=state.theme;document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view));let p=active();$('#mini').innerHTML=p?`<strong>${esc(p.name)}</strong><br>${esc(p.status||'Active')} · ${(p.artifacts||[]).length} artifacts<br><br><span class="pill">${scores(p).conf}% confidence</span>`:'No active project.';({library,dashboard,artifacts,snapshots,checklist,export:exportView}[state.view]||library)()}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function library(){let activeProjects=state.projects.filter(p=>!p.archived), archived=state.projects.filter(p=>p.archived);app.innerHTML=`<section class="panel hero"><div><h2>PROJECT<br>RELIQUARY</h2><p class="lede">Collect the evidence of a hardware build: electronics, mechanical files, machine files, software, documentation, and dated design snapshots. RELIQUARY helps show what exists, what is missing, and whether the project can be understood later.</p><div class="row"><button class="btn primary" onclick="newProject()">New Project</button><button class="btn" onclick="loadDemo()">Load Demo</button></div></div><div class="card"><h3>Archive intent</h3><p>This is not a task board. It is a snapshot cabinet for design artifacts, rebuild confidence, and preservation packages.</p><div class="stats"><div class="stat"><strong>${state.projects.length}</strong><span>Projects</span></div><div class="stat"><strong>${sum('artifacts')}</strong><span>Artifacts</span></div><div class="stat"><strong>${sum('snapshots')}</strong><span>Snapshots</span></div><div class="stat"><strong>${archived.length}</strong><span>Archived</span></div></div></div></section><section class="panel"><div class="head"><div><h2>Project Library</h2><p>Choose a project cabinet or create a new one.</p></div><button class="btn primary" onclick="newProject()">Add Project</button></div><div class="cardgrid">${activeProjects.map(projectCard).join('')||'<div class="empty">No active projects.</div>'}</div>${archived.length?`<h3>Archived</h3><div class="cardgrid">${archived.map(projectCard).join('')}</div>`:''}</section>`}
function projectCard(p){let s=scores(p);return`<article class="card"><span class="tag">${esc(p.code||'FI-072')}</span><h3>${esc(p.name)}</h3><p>${esc(p.description||'No description yet.')}</p><div class="row"><span class="tag">${esc(p.status||'Active')}</span><span class="tag">${(p.artifacts||[]).length} artifacts</span><span class="tag">${(p.snapshots||[]).length} snapshots</span></div><p><b>Rebuild confidence</b></p><div class="bar"><i style="width:${s.conf}%"></i></div><p><b>Documentation</b></p><div class="bar"><i style="width:${s.comp}%"></i></div><div class="row" style="margin-top:12px"><button class="btn small primary" onclick="openProject('${p.id}')">Open</button><button class="btn small" onclick="editProject('${p.id}')">Edit</button><button class="btn small" onclick="archiveProject('${p.id}')">${p.archived?'Restore':'Archive'}</button></div></article>`}
function dashboard(){let p=active();if(!p)return library();let s=scores(p);app.innerHTML=`<section class="panel"><div class="head"><div><h2>${esc(p.name)}</h2><p>${esc(p.description||'No description yet.')}</p></div><div class="row"><button class="btn" onclick="editProject('${p.id}')">Edit Project</button><button class="btn primary" onclick="state.view='artifacts';touch()">Add Artifacts</button></div></div><div class="stats"><div class="stat"><strong>${s.conf}%</strong><span>Rebuild confidence</span></div><div class="stat"><strong>${s.comp}%</strong><span>Documentation</span></div><div class="stat"><strong>${(p.artifacts||[]).length}</strong><span>Artifacts</span></div><div class="stat"><strong>${(p.snapshots||[]).length}</strong><span>Snapshots</span></div></div></section><section class="panel"><div class="head"><div><h3>Critical Gaps</h3><p>Advisory checks based on artifact names, roles, notes, and checklist state.</p></div></div><div class="cardgrid">${s.gaps.slice(0,6).map(gapCard).join('')||'<div class="empty">No obvious gaps detected.</div>'}</div></section><section class="panel"><div class="head"><div><h3>Artifact Summary</h3></div></div><div class="stats">${Object.keys(cats).map(k=>`<div class="stat"><strong>${(p.artifacts||[]).filter(a=>a.category===k).length}</strong><span>${cats[k]}</span></div>`).join('')}</div></section>`}
function gapCard(g){return`<div class="card gap ${g.sev==='critical'?'critical':''}"><span class="tag">${g.sev}</span><h3>${esc(g.title)}</h3><p>${esc(g.detail)}</p></div>`}
function artifacts(){let p=active();let f=state.filters||{};let arts=(p.artifacts||[]).filter(a=>(f.cat==='all'||!f.cat||a.category===f.cat)&&(f.status==='all'||!f.status||a.status===f.status)&&(!f.q||[a.name,a.role,a.url,a.notes].join(' ').toLowerCase().includes(f.q.toLowerCase())));app.innerHTML=`<section class="panel"><div class="head"><div><h2>Artifact Cabinet</h2><p>Register the files, links, and notes that explain the current project state.</p></div></div><form class="formgrid" onsubmit="addArtifact(event)"><div class="field"><label>Name</label><input name="name" required placeholder="front-panel-v3.stl"></div><div class="field"><label>Category</label><select name="category">${opts(cats)}</select></div><div class="field"><label>Role</label><select name="role">${roles.map(r=>`<option>${r}</option>`).join('')}</select></div><div class="field"><label>Status</label><select name="status"><option>Current</option><option>Draft</option><option>Reference</option><option>Superseded</option><option>Missing</option><option>Archived</option></select></div><div class="field full"><label>Path or URL</label><input name="url" placeholder="docs/BOM.xlsx or https://github.com/.../file"></div><div class="field full"><label>Notes</label><textarea name="notes" placeholder="What role does this artifact play?"></textarea></div><div class="full row"><button class="btn primary">Add Artifact</button><button class="btn" type="button" onclick="bulkAdd()">Bulk Add</button></div></form></section><section class="panel"><div class="head"><div><h3>Files and References</h3></div><div class="row"><input style="width:220px" placeholder="Search" value="${esc(f.q||'')}" oninput="state.filters.q=this.value;render()"><select onchange="state.filters.cat=this.value;render()"><option value="all">All categories</option>${opts(cats,f.cat)}</select><select onchange="state.filters.status=this.value;render()"><option value="all">All statuses</option>${['Current','Draft','Reference','Superseded','Missing','Archived'].map(x=>`<option ${f.status===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div style="overflow:auto"><table><thead><tr><th>Name</th><th>Category</th><th>Role</th><th>Status</th><th>Path / URL</th><th></th></tr></thead><tbody>${arts.map(a=>`<tr><td><b>${esc(a.name)}</b><br><span class="tag">.${esc(a.extension||ext(a.name)||'?')}</span></td><td>${cats[a.category]||a.category}</td><td>${esc(a.role)}</td><td>${esc(a.status)}</td><td>${a.url?`<a href="${esc(a.url)}" target="_blank" rel="noreferrer">${esc(a.url)}</a>`:''}<br><small>${esc(a.notes||'')}</small></td><td class="row"><button class="btn small" onclick="editArtifact('${a.id}')">Edit</button><button class="btn small bad" onclick="deleteArtifact('${a.id}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="6">No artifacts match.</td></tr>'}</tbody></table></div></section>`}
function snapshots(){let p=active();app.innerHTML=`<section class="panel"><div class="head"><div><h2>Design Snapshots</h2><p>A snapshot captures a dated design state so the project can be resumed, rebuilt, or published later.</p></div></div><form class="formgrid" onsubmit="addSnapshot(event)"><div class="field"><label>Name</label><input name="name" required placeholder="Prototype Rev A"></div><div class="field"><label>Date</label><input type="date" name="date" value="${today()}"></div><div class="field"><label>Stage</label><select name="stage"><option>Concept</option><option>Breadboard</option><option>Prototype</option><option>Rev A</option><option>Rev B</option><option>Fabrication</option><option>Assembly</option><option>Testing</option><option>Published</option><option>Retired</option></select></div><div class="field"><label>Include artifacts</label><select name="mode"><option value="current">Current artifacts</option><option value="all">All artifacts</option><option value="none">None</option></select></div><div class="field full"><label>Summary</label><textarea name="summary"></textarea></div><div class="field full"><label>Known issues</label><textarea name="knownIssues"></textarea></div><div class="full"><button class="btn primary">Create Snapshot</button></div></form></section><section class="panel"><div class="head"><div><h3>Timeline</h3></div></div><div class="timeline">${(p.snapshots||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(s=>`<article class="snap"><time>${esc(s.date||'undated')} · ${esc(s.stage||'Snapshot')}</time><h3>${esc(s.name)}</h3><p>${esc(s.summary||'No summary.')}</p>${s.knownIssues?`<p><b>Known issues:</b> ${esc(s.knownIssues)}</p>`:''}<span class="tag">${(s.artifactIds||[]).length} artifacts</span><div class="row" style="margin-top:10px"><button class="btn small" onclick="editSnapshot('${s.id}')">Edit</button><button class="btn small bad" onclick="deleteSnapshot('${s.id}')">Delete</button></div></article>`).join('')||'<div class="empty">No snapshots yet.</div>'}</div></section>`}
function checklist(){let p=active();let s=scores(p);app.innerHTML=`<section class="panel"><div class="head"><div><h2>Rebuild Readiness</h2><p>Manual checklist state combines with inferred artifact evidence. Items can be marked done or not applicable.</p></div><button class="btn" onclick="p.checklist={};touch('Checklist reset')">Reset manual states</button></div><div class="stats"><div class="stat"><strong>${s.comp}%</strong><span>Completeness</span></div><div class="stat"><strong>${s.conf}%</strong><span>Confidence</span></div><div class="stat"><strong>${s.gaps.filter(g=>g.sev==='critical').length}</strong><span>Critical gaps</span></div><div class="stat"><strong>${s.gaps.length}</strong><span>Total gaps</span></div></div></section><section class="panel"><div class="checks">${checks.map(c=>checkCard(p,c)).join('')}</div></section><section class="panel"><h3>Detected Gaps</h3><div class="cardgrid">${s.gaps.map(gapCard).join('')||'<div class="empty">No obvious gaps detected.</div>'}</div></section>`}
function checkCard(p,c){let st=p.checklist?.[c[0]]||'open';let inf=inferredDone(p,c[0]);let done=st==='done'||inf;return`<div class="check ${st==='na'?'na':done?'done':''}"><span class="tag">${esc(c[3])}</span><h3>${esc(c[1])}</h3><p>${esc(c[2])}</p><div class="row"><label><input type="checkbox" ${st==='done'?'checked':''} onchange="setCheck('${c[0]}',this.checked?'done':'open')"> Done</label><button class="btn small" onclick="setCheck('${c[0]}','${st==='na'?'open':'na'}')">${st==='na'?'Use item':'N/A'}</button>${inf?'<span class="tag ok">inferred</span>':''}</div></div>`}
function exportView(){let p=active();let s=scores(p);app.innerHTML=`<section class="panel"><div class="head"><div><h2>Preservation Package</h2><p>Export durable project records for GitHub, local archive, or publication.</p></div></div><div class="cardgrid"><div class="card"><h3>RELIQUARY JSON</h3><p>Full backup of all projects, artifacts, snapshots, and checklist states.</p><button class="btn primary" onclick="download('reliquary-export.json',JSON.stringify(state,null,2),'application/json')">Export JSON</button></div><div class="card"><h3>README Draft</h3><p>Markdown overview for the active project.</p><button class="btn primary" onclick="download('README.md',readme(active()),'text/markdown')">Export README</button></div><div class="card"><h3>Artifact Manifest</h3><p>CSV file index with category, role, status, and path.</p><button class="btn primary" onclick="download('artifact-manifest.csv',manifest(active()),'text/csv')">Export CSV</button></div><div class="card"><h3>Project Dossier</h3><p>Printable HTML snapshot summary, scores, and gaps.</p><button class="btn primary" onclick="download('project-dossier.html',dossier(active()),'text/html')">Export Dossier</button></div></div></section><section class="panel"><h3>Current Package Status</h3><div class="stats"><div class="stat"><strong>${s.conf}%</strong><span>Confidence</span></div><div class="stat"><strong>${s.comp}%</strong><span>Documentation</span></div><div class="stat"><strong>${(p.artifacts||[]).length}</strong><span>Artifacts</span></div><div class="stat"><strong>${s.gaps.length}</strong><span>Gaps</span></div></div></section>`}
function opts(obj,sel){return Object.entries(obj).map(([k,v])=>`<option value="${k}" ${sel===k?'selected':''}>${v}</option>`).join('')}
function sum(k){return state.projects.reduce((n,p)=>n+(p[k]||[]).length,0)}
function openProject(id){state.activeProjectId=id;state.view='dashboard';touch()}
function newProject(){let name=prompt('Project name?');if(!name)return;let p={id:uid('proj'),name,code:prompt('Project code or FI number?','FI-072')||'FI-072',description:prompt('Short description?','')||'',status:'Concept',type:'Hardware',repoUrl:'',heroImage:'',tags:[],archived:false,createdAt:now(),updatedAt:now(),notes:'',artifacts:[],snapshots:[],checklist:{}};state.projects.unshift(p);state.activeProjectId=p.id;state.view='dashboard';touch('Project created')}
function editProject(id){let p=state.projects.find(x=>x.id===id)||active();if(!p)return;p.name=prompt('Project name',p.name)||p.name;p.code=prompt('Project code',p.code||'')||p.code;p.status=prompt('Status',p.status||'')||p.status;p.type=prompt('Type',p.type||'')||p.type;p.repoUrl=prompt('GitHub/repo URL',p.repoUrl||'')||p.repoUrl;p.heroImage=prompt('Hero image URL',p.heroImage||'')||p.heroImage;p.description=prompt('Description',p.description||'')||p.description;p.updatedAt=now();touch('Project updated')}
function archiveProject(id){let p=state.projects.find(x=>x.id===id);p.archived=!p.archived;touch(p.archived?'Project archived':'Project restored')}
function addArtifact(e){e.preventDefault();let p=active(),f=new FormData(e.target),a=artifact(f.get('name'),f.get('category'),f.get('role'),f.get('status'),f.get('url'),f.get('notes'),null);p.artifacts.unshift(a);p.updatedAt=now();e.target.reset();touch('Artifact added')}
function editArtifact(id){let p=active(),a=p.artifacts.find(x=>x.id===id);if(!a)return;a.name=prompt('Artifact name',a.name)||a.name;a.category=prompt('Category key: '+Object.keys(cats).join(', '),a.category)||a.category;a.role=prompt('Role',a.role)||a.role;a.status=prompt('Status',a.status)||a.status;a.url=prompt('Path or URL',a.url||'')||a.url;a.notes=prompt('Notes',a.notes||'')||a.notes;a.extension=ext(a.name||a.url);a.updatedAt=now();touch('Artifact updated')}
function deleteArtifact(id){if(!confirm('Delete this artifact?'))return;let p=active();p.artifacts=p.artifacts.filter(a=>a.id!==id);p.snapshots.forEach(s=>s.artifactIds=(s.artifactIds||[]).filter(x=>x!==id));touch('Artifact deleted')}
function bulkAdd(){let txt=prompt('Paste one artifact per line. Optional format: name | category | role | path/url | notes');if(!txt)return;let p=active();txt.split(/\n+/).map(x=>x.trim()).filter(Boolean).forEach(line=>{let parts=line.split('|').map(x=>x.trim());p.artifacts.unshift(artifact(parts[0],parts[1]&&cats[parts[1]]?parts[1]:'documentation',parts[2]||'Unknown / needs classification','Current',parts[3]||'',parts[4]||'',null))});touch('Bulk artifacts added')}
function addSnapshot(e){e.preventDefault();let p=active(),f=new FormData(e.target),mode=f.get('mode');let ids=mode==='all'?p.artifacts.map(a=>a.id):mode==='current'?p.artifacts.filter(a=>a.status==='Current'||a.status==='Draft').map(a=>a.id):[];p.snapshots.unshift({id:uid('snap'),name:f.get('name'),date:f.get('date')||today(),stage:f.get('stage'),summary:f.get('summary'),knownIssues:f.get('knownIssues'),artifactIds:ids});p.updatedAt=now();e.target.reset();touch('Snapshot created')}
function editSnapshot(id){let p=active(),s=p.snapshots.find(x=>x.id===id);if(!s)return;s.name=prompt('Snapshot name',s.name)||s.name;s.date=prompt('Date',s.date)||s.date;s.stage=prompt('Stage',s.stage)||s.stage;s.summary=prompt('Summary',s.summary||'')||s.summary;s.knownIssues=prompt('Known issues',s.knownIssues||'')||s.knownIssues;touch('Snapshot updated')}
function deleteSnapshot(id){if(!confirm('Delete this snapshot?'))return;let p=active();p.snapshots=p.snapshots.filter(s=>s.id!==id);touch('Snapshot deleted')}
function setCheck(id,val){let p=active();p.checklist=p.checklist||{};p.checklist[id]=val;touch('Checklist updated')}
function loadDemo(){let demo=sampleState().projects[0];state.projects.unshift(demo);state.activeProjectId=demo.id;state.view='dashboard';touch('Demo project loaded')}
function readme(p){let s=scores(p);return`# ${p.name}\n\n${p.description||''}\n\n- Project code: ${p.code||''}\n- Status: ${p.status||''}\n- Type: ${p.type||''}\n- Repository: ${p.repoUrl||''}\n- Rebuild confidence: ${s.conf}%\n- Documentation completeness: ${s.comp}%\n\n## Design Snapshots\n\n${(p.snapshots||[]).map(x=>`### ${x.name}\n\n${x.date||''} · ${x.stage||''}\n\n${x.summary||''}\n\nKnown issues: ${x.knownIssues||'None listed.'}`).join('\n\n')}\n\n## Artifact Index\n\n${(p.artifacts||[]).map(a=>`- **${a.name}** — ${cats[a.category]||a.category}; ${a.role}; ${a.status}; ${a.url||''}`).join('\n')}\n\n## Documentation Gaps\n\n${s.gaps.map(g=>`- **${g.title}**: ${g.detail}`).join('\n')||'No obvious gaps detected.'}\n`}
function manifest(p){let rows=[['name','category','role','status','extension','path_or_url','notes']];(p.artifacts||[]).forEach(a=>rows.push([a.name,cats[a.category]||a.category,a.role,a.status,a.extension,a.url,a.notes]));return rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n')}
function dossier(p){let s=scores(p);return`<!doctype html><html><head><meta charset="utf-8"><title>${esc(p.name)} Dossier</title><style>body{font-family:system-ui;margin:40px;line-height:1.5}h1{font-family:Georgia,serif}.gap{border-left:4px solid #a86812;padding-left:12px}</style></head><body><h1>${esc(p.name)}</h1><p>${esc(p.description||'')}</p><p><b>Rebuild confidence:</b> ${s.conf}% · <b>Documentation:</b> ${s.comp}%</p><h2>Snapshots</h2>${(p.snapshots||[]).map(x=>`<h3>${esc(x.name)}</h3><p>${esc(x.date||'')} · ${esc(x.stage||'')}</p><p>${esc(x.summary||'')}</p>`).join('')}<h2>Gaps</h2>${s.gaps.map(g=>`<div class="gap"><b>${esc(g.title)}</b><p>${esc(g.detail)}</p></div>`).join('')||'<p>No obvious gaps detected.</p>'}<h2>Artifacts</h2><ul>${(p.artifacts||[]).map(a=>`<li><b>${esc(a.name)}</b> — ${esc(cats[a.category]||a.category)}; ${esc(a.role)}; ${esc(a.status)}</li>`).join('')}</ul></body></html>`}
function download(name,content,type){let b=new Blob([content],{type}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}
function exportAll(){download('reliquary-export.json',JSON.stringify(state,null,2),'application/json')}
$('#themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';touch('Theme changed')};$('#exportBtn').onclick=exportAll;$('#importFile').onchange=e=>{let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);state.activeProjectId=state.activeProjectId||state.projects[0]?.id;touch('JSON imported')}catch{note('Import failed')}};r.readAsText(file)};document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;touch()});window.state=state;Object.assign(window,{newProject,editProject,archiveProject,openProject,loadDemo,addArtifact,editArtifact,deleteArtifact,bulkAdd,addSnapshot,editSnapshot,deleteSnapshot,setCheck,download,readme,manifest,dossier,exportAll});render();save();
})();
</script>
</body>
</html>
