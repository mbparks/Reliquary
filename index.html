ts Center</h2><div class='cards'><div class='card'><h3>README draft</h3><button class='btn primary' onclick='dl("README.md",readme(A()),"text/markdown")'>Export</button></div><div class='card'><h3>Artifact manifest CSV</h3><button class='btn primary' onclick='dl("artifact-manifest.csv",csv(A()),"text/csv")'>Export</button></div><div class='card'><h3>Project dossier HTML</h3><button class='btn primary' onclick='dl("project-dossier.html",dossier(A()),"text/html")'>Export</button></div><div class='card'><h3>Checklist report</h3><button class='btn primary' onclick='dl("rebuild-checklist.md",checkmd(A()),"text/markdown")'>Export</button></div><div class='card'><h3>Project JSON</h3><button class='btn primary' onclick='dl("reliquary-project.json",JSON.stringify(A(),null,2),"application/json")'>Export</button></div></div></section>`}function kb(){let p=A();p.parts=p.parts||[];p.tools=p.tools||[];p.lessons=p.lessons||[];app.innerHTML=`<section class='panel'><h2>Hardware Knowledge Base</h2><div class='cards'><div class='card'><h3>Parts</h3><form onsubmit='addRec("parts",this);return false'><input name='name' placeholder='Part name' required><input name='qty' placeholder='Qty'><input name='source' placeholder='Source'><textarea name='notes' placeholder='Notes'></textarea><button class='btn primary'>Add Part</button></form>${p.parts.map(x=>`<p><b>${esc(x.name)}</b> ${esc(x.qty||'')}<br><span class='muted'>${esc(x.notes||'')}</span></p>`).join('')}</div><div class='card'><h3>Tools</h3><form onsubmit='addRec("tools",this);return false'><input name='name' placeholder='Tool' required><input name='use' placeholder='Use'><input name='settings' placeholder='Settings'><textarea name='notes' placeholder='Notes'></textarea><button class='btn primary'>Add Tool</button></form>${p.tools.map(x=>`<p><b>${esc(x.name)}</b> — ${esc(x.use||'')}<br><span class='muted'>${esc(x.settings||'')}</span></p>`).join('')}</div><div class='card'><h3>Lessons / Repairs</h3><form onsubmit='addRec("lessons",this);return false'><input name='type' placeholder='Lesson, Failure, Repair' required><input name='title' placeholder='Title'><textarea name='body' placeholder='Details'></textarea><input name='date' type='date' value='${new Date().toISOString().slice(0,10)}'><button class='btn primary'>Add Note</button></form>${p.lessons.map(x=>`<p><span class='badge'>${esc(x.type)}</span> <b>${esc(x.title)}</b><br><span class='muted'>${esc(x.body||'')}</span></p>`).join('')}</div></div></section>`}function publish(){let p=A(),s=score(p);app.innerHTML=`<section class='panel'><h2>Publish Readiness</h2><div class='stats'><div class='stat'><b>${s.conf}%</b><br><span class='muted'>Rebuild confidence</span></div><div class='stat'><b>${s.comp}%</b><br><span class='muted'>Documentation</span></div><div class='stat'><b>${s.gaps.length}</b><br><span class='muted'>Open gaps</span></div><div class='stat'><b>${p.artifacts.length}</b><br><span class='muted'>Artifacts</span></div></div><h3>Release gates</h3>${s.gaps.map(g=>`<div class='card gap ${g.s==='critical'?'critical':''}'><b>${esc(g.t)}</b><p class='muted'>${esc(g.d)}</p></div>`).join('')||'<p class=ok>Ready for publication package.</p>'}<p><button class='btn primary' onclick='dl("public-project-page.html",pub(A()),"text/html")'>Export Public Page</button></p></section>`}function fd(f){return Object.fromEntries(new FormData(typeof f==='string'?$(f):f).entries())}function addP(f){let d=fd(f),p={id:id('proj'),name:d.name,code:d.code,description:d.description,status:'Concept',type:'Hardware',repoUrl:'',branch:'main',tags:[],archived:false,artifacts:[],snaps:[],checks:{},parts:[],tools:[],lessons:[]};S.projects.unshift(p);S.active=p.id;S.view='dash';touch('Project created')}function openP(x){S.active=x;S.view='dash';touch()}function editP(){let p=A(),n=prompt('Project name',p.name);if(n!==null)p.name=n;let d=prompt('Description',p.description);if(d!==null)p.description=d;touch('Project updated')}function dupP(x){let p=JSON.parse(JSON.stringify(S.projects.find(p=>p.id==x)));p.id=id('proj');p.name+=' Copy';S.projects.unshift(p);S.active=p.id;touch('Duplicated')}function delP(x){if(S.projects.length<2)return note('Keep at least one project');if(confirm('Delete project?')){S.projects=S.projects.filter(p=>p.id!=x);S.active=S.projects[0].id;touch('Deleted')}}function addA(f){let d=fd(f),a=mkArt(d.path);a.status=d.status;a.notes=d.notes;A().artifacts.unshift(a);touch('Artifact added')}function editA(x){let a=A().artifacts.find(a=>a.id==x),n=prompt('Path',a.path);if(n){Object.assign(a,mkArt(n),{id:a.id,status:a.status,notes:a.notes})}let notes=prompt('Notes',a.notes||'');if(notes!==null)a.notes=notes;touch('Artifact updated')}function delA(x){if(confirm('Delete artifact?')){let p=A();p.artifacts=p.artifacts.filter(a=>a.id!=x);p.snaps.forEach(s=>s.artifactIds=(s.artifactIds||[]).filter(i=>i!=x));touch('Deleted')}}function sort(k){SO=k;DIR*=-1;render()}function addSnp(f){let p=A(),d=fd(f);p.snaps.unshift({...d,id:id('snap'),artifactIds:p.artifacts.filter(a=>a.status!='Archived').map(a=>a.id),current:false});touch('Snapshot created')}function curS(x){A().snaps.forEach(s=>s.current=s.id==x);touch('Current snapshot marked')}function delS(x){if(confirm('Delete snapshot?')){let p=A();p.snaps=p.snaps.filter(s=>s.id!=x);touch('Snapshot deleted')}}function cmp(){let p=A(),a=p.snaps.find(x=>x.id==sa.value),b=p.snaps.find(x=>x.id==sb.value);if(!a||!b||a.id==b.id){cmpbox.innerHTML='<p class=muted>Pick two different snapshots.</p>';return}let A1=new Set(a.artifactIds||[]),B1=new Set(b.artifactIds||[]),nm=x=>p.artifacts.find(a=>a.id==x)?.name||x;cmpbox.innerHTML=`<div class='cards'><div class='card'><h3>Added</h3>${[...B1].filter(x=>!A1.has(x)).map(nm).join('<br>')||'None'}</div><div class='card'><h3>Removed</h3>${[...A1].filter(x=>!B1.has(x)).map(nm).join('<br>')||'None'}</div></div>`}function setCk(k,v){A().checks[k]=v;touch('Checklist updated')}function importTree(t){let p=A(),n=0,ex=new Set(p.artifacts.map(a=>a.path));t.split(/\n+/).map(x=>x.trim().replace(/^[-*\s├└│─]+/,'')).filter(Boolean).forEach(x=>{if(!ex.has(x)){p.artifacts.unshift(mkArt(x));ex.add(x);n++}});if(n)p.snaps.unshift({id:id('snap'),name:'Imported File Tree '+new Date().toISOString().slice(0,10),date:new Date().toISOString().slice(0,10),stage:'Imported',summary:`Imported ${n} artifacts.`,change:'Bulk repository/file tree import.',known:'Review auto-classification and fill documentation gaps.',artifactIds:p.artifacts.slice(0,n).map(a=>a.id)});touch(`Imported ${n} artifacts`)}function parseRepo(u){let m=String(u).match(/github\.com[:\/]+([^\/]+)\/([^\/#?]+)/);return m&&{o:m[1],r:m[2].replace(/\.git$/,'')}}async function scanGH(){let x=parseRepo(repo.value),rf=ref.value||'main';if(!x){scanout.innerHTML='<p class=bad>Bad GitHub URL.</p>';return}scanout.innerHTML='<p class=muted>Scanning public GitHub tree...</p>';try{let res=await fetch(`https://api.github.com/repos/${x.o}/${x.r}/git/trees/${rf}?recursive=1`);if(!res.ok)throw Error(res.status);let data=await res.json(),paths=data.tree.filter(x=>x.type==='blob').map(x=>x.path);tree.value=paths.join('\n');scanout.innerHTML=`<div class='card'><h3>Scan complete</h3><p>${paths.length} files found.</p><button class='btn primary' onclick='importTree(tree.value)'>Import scanned tree</button></div>`}catch(e){scanout.innerHTML=`<p class=bad>Scan failed: ${e.message}. Paste a file tree manually.</p>`}}function addRec(arr,f){let p=A(),d=fd(f);p[arr]=p[arr]||[];p[arr].unshift({...d,id:id(arr)});touch('Saved')}function readme(p){let s=score(p);return`# ${p.name}\n\n${p.description||''}\n\n- Status: ${p.status||''}\n- Type: ${p.type||''}\n- Rebuild confidence: ${s.conf}%\n- Documentation completeness: ${s.comp}%\n\n## Snapshots\n${(p.snaps||[]).map(x=>`### ${x.name}\n${x.date||''} · ${x.stage||''}\n\n${x.summary||''}\n\nKnown issues: ${x.known||'None listed.'}`).join('\n\n')}\n\n## Artifacts\n${p.artifacts.map(a=>`- **${a.name}** — ${C[a.category]||a.category}; ${a.role}; ${a.path}`).joi
